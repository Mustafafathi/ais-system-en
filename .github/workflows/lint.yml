name: Repository Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Lint PHP files
        run: |
          find . -type f -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  secret-pattern-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block known local secrets and institution names
        run: |
          ! grep -RInE "Dev_656|СТИ НИТУ|Старооскольский технологический институт|C:\\\\Program Files" \
            --exclude-dir=.git \
            --exclude='*.docx' \
            --exclude='*.xlsx' \
            .
