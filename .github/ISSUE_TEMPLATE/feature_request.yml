name: Feature request
description: Suggest an improvement
title: "Feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior or workflow.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Affected roles or modules
      description: Administrator, methodist, teacher, curator, student, API, SQL, integrations, or documentation.
