services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ais_sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-CHANGE_ME_STRONG_LOCAL_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./Database/schema:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ais_php
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./config.example.php:/var/www/html/config.php:ro
    environment:
      AIS_SITE_URL: "http://localhost:8080/"
      AIS_DB_HOST: "db"
      AIS_DB_PORT: "1433"
      AIS_DB_NAME: "UniversityAttendance"
      AIS_DB_USER: "sa"
      AIS_DB_PASSWORD: "${MSSQL_SA_PASSWORD:-CHANGE_ME_STRONG_LOCAL_PASSWORD}"
      AIS_DB_ENCRYPT: "false"
      AIS_DB_TRUST_SERVER_CERT: "true"
      AIS_SKUD_SECRET: "${AIS_SKUD_SECRET:-CHANGE_ME_HMAC_SECRET}"
      AIS_HEALTH_SECRET: "${AIS_HEALTH_SECRET:-CHANGE_ME_HEALTH_SECRET}"
    restart: unless-stopped

volumes:
  sql_data:


